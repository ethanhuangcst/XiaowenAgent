<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XiaowenAgent 测试页面</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border: 1px solid #ddd;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .status-box {
            background: #f8f9fa;
            padding: 15px;
            margin: 15px 0;
            border: 1px solid #ddd;
        }
        .status-item {
            margin: 8px 0;
            font-size: 13px;
        }
        .status-label {
            font-weight: bold;
            color: #555;
        }
        .status-value {
            color: #007bff;
            margin-left: 10px;
        }
        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 14px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        /* 对话容器 */
        .chat-container {
            display: flex;
            flex-direction: column;
            height: 600px;
            border: 1px solid #ddd;
            overflow: hidden;
        }
        
        /* 对话历史 */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            background: #fafafa;
        }
        
        /* 消息卡片 */
        .message-card {
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            background: #fff;
        }
        
        .message-card.user {
            background: #f0f0f0;
        }
        
        /* 消息头部 */
        .message-header {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #ddd;
        }
        
        .message-role {
            font-weight: bold;
            color: #666;
            font-size: 13px;
        }
        
        .message-time {
            font-size: 11px;
            color: #999;
            margin-left: 10px;
        }
        
        .copy-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 4px 10px;
            font-size: 11px;
            cursor: pointer;
            float: right;
        }
        
        .copy-btn:hover {
            background: #218838;
        }
        
        .copy-btn.copied {
            background: #ffc107;
            color: #000;
        }
        
        /* 消息内容 */
        .message-content {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
            color: #333;
            font-size: 13px;
        }
            font-size: 18px;
        }
        
        /* 输入区域 */
        .chat-input-area {
            border-top: 1px solid #ddd;
            padding: 10px;
            background: white;
        }
        
        .input-label {
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            color: #555;
            font-size: 13px;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
        }
        
        .input-row textarea {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: Arial, sans-serif;
            font-size: 14px;
            resize: none;
        }
        
        .input-row button {
            margin: 0;
            padding: 10px 25px;
        }
        
        .log-box {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .log-entry {
            margin: 5px 0;
        }
        
        /* 导航区样式 */
        .navigation-area {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #ddd;
        }
        
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }
        
        .nav-btn {
            padding: 12px 20px;
            border: 1px solid #ddd;
            background: white;
            color: #333;
            cursor: pointer;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }
        
        .nav-btn:hover:not(.current) {
            background: #e3f2fd;
            border-color: #007bff;
            color: #007bff;
        }
        
        .nav-step {
            flex: 2;
            padding: 12px 20px;
            text-align: center;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #007bff;
            background: #e3f2fd;
            border: 2px solid #007bff;
        }
        
        .nav-btn.prev, .nav-btn.next {
            flex: 1;
        }
        
        .nav-btn:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 XiaowenAgent 测试页面</h1>
        
        <div class="status-box">
            <h3>Agent 状态</h3>
            <div class="status-item">
                <span class="status-label">状态:</span>
                <span class="status-value" id="status">未启动</span>
            </div>
            <div class="status-item">
                <span class="status-label">当前任务:</span>
                <span class="status-value" id="task">无</span>
            </div>
            <div class="status-item">
                <span class="status-label">当前步骤:</span>
                <span class="status-value" id="step">无</span>
            </div>
            <div class="status-item">
                <span class="status-label">最后更新:</span>
                <span class="status-value" id="lastUpdate">-</span>
            </div>
        </div>

        <div style="text-align: center; margin: 20px 0;">
            <button onclick="startAgent()">启动 Agent</button>
            <button onclick="resetAgent()">重置 Agent</button>
            <button onclick="getState()">获取状态</button>
        </div>

        <div class="status-box">
            <h3>输入信息</h3>
            <div style="margin: 10px 0;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">背景信息：</label>
                <textarea id="backgroundInput" rows="3" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: monospace;" placeholder="例如：Ethan Huang，敏捷专家，200+小时AI辅助开发经验"></textarea>
            </div>
            <div style="margin: 10px 0;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">输入大纲：</label>
                <textarea id="outlineInput" rows="6" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-family: monospace;" placeholder="请输入Markdown格式的大纲..."></textarea>
            </div>
            <div style="margin: 10px 0;">
                <label style="font-weight: bold; display: block; margin-bottom: 5px;">优化要求（可选）：</label>
                <input type="text" id="requirementsInput" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;" placeholder="例如：增加钩子、优化标题等">
            </div>
            <div style="text-align: center; margin: 10px 0;">
                <button onclick="optimizeOutline()">优化大纲</button>
            </div>
        </div>

        <div class="status-box">
            <h3>智能体</h3>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="message-card agent">
                        <div class="message-header">
                            <span class="message-role">智能体</span>
                            <span class="message-time">系统消息</span>
                        </div>
                        <div class="message-content">你好！我是XiaowenAgent，你的智能助手。我可以帮你优化大纲、生成内容，并根据你的反馈持续学习和改进。

请先填写上方的"背景信息"、"输入大纲"和"优化要求"，然后点击"优化大纲"按钮开始。</div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <label class="input-label">我：</label>
                    <div class="input-row">
                        <textarea id="chatInput" rows="2" placeholder="输入你的反馈、建议或问题..."></textarea>
                        <button onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </div>
            
            <!-- 导航区 -->
            <div class="navigation-area">
                <div class="nav-buttons">
                    <button class="nav-btn prev" onclick="goToPrevious()">
                        ← 返回文案列表
                    </button>
                    <span class="nav-step">
                        第一步 - 优化大纲
                    </span>
                    <button class="nav-btn next" onclick="goToNext()">
                        下一步：形成文案 →
                    </button>
                </div>
            </div>
        </div>

        <div class="log-box" id="logBox">
            <div class="log-entry">等待操作...</div>
        </div>
    </div>

    <script>
        let isLoading = false;
        let optimizedOutline = ''; // 保存优化后的大纲
        let currentStep = 1; // 当前步骤：1=优化大纲，2=生成文案
        
        function log(message) {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function setLoading(loading) {
            isLoading = loading;
            const sendBtn = document.querySelector('.input-row button');
            const chatInput = document.getElementById('chatInput');
            
            if (loading) {
                sendBtn.disabled = true;
                sendBtn.textContent = '处理中...';
                chatInput.disabled = true;
            } else {
                sendBtn.disabled = false;
                sendBtn.textContent = '发送';
                chatInput.disabled = false;
            }
        }

        function updateStatus(data) {
            if (data.success && data.state) {
                document.getElementById('status').textContent = data.state.agentState.status;
                document.getElementById('task').textContent = data.state.agentState.currentTask || '无';
                document.getElementById('step').textContent = data.state.currentStep;
                document.getElementById('lastUpdate').textContent = new Date(data.state.agentState.lastUpdate).toLocaleString();
            } else {
                document.getElementById('status').textContent = '错误';
                document.getElementById('task').textContent = data.error || '未知错误';
            }
        }

        function addMessage(role, content, time = null) {
            const chatMessages = document.getElementById('chatMessages');
            
            const messageCard = document.createElement('div');
            messageCard.className = `message-card ${role}`;
            
            const messageTime = time || new Date().toLocaleTimeString();
            
            messageCard.innerHTML = `
                <div class="message-header">
                    <span class="message-role">${role === 'user' ? '我' : '智能体'}</span>
                    <span class="message-time">${messageTime}</span>
                    <button class="copy-btn" onclick="copyMessage(this)">复制</button>
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            
            chatMessages.appendChild(messageCard);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyMessage(button) {
            const messageCard = button.closest('.message-card');
            const content = messageCard.querySelector('.message-content').textContent;
            
            navigator.clipboard.writeText(content).then(() => {
                button.textContent = '已复制';
                button.classList.add('copied');
                setTimeout(() => {
                    button.textContent = '复制';
                    button.classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }

        async function startAgent() {
            try {
                log('启动 Agent...');
                
                const response = await fetch('/api/agent-test/start', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                
                const data = await response.json();
                updateStatus(data);
                
                if (data.success) {
                    log('Agent 启动成功！');
                } else {
                    log(`错误: ${data.error}`);
                }
            } catch (error) {
                log(`错误: ${error.message}`);
            }
        }

        async function resetAgent() {
            try {
                log('重置 Agent...');
                
                const response = await fetch('/api/agent-test/reset', {
                    method: 'POST'
                });
                
                const data = await response.json();
                updateStatus(data);
                
                if (data.success) {
                    log('Agent 已重置！');
                    // 清空对话历史
                    document.getElementById('chatMessages').innerHTML = `
                        <div class="message-card agent">
                            <div class="message-header">
                                <span class="message-role">智能体</span>
                                <span class="message-time">系统消息</span>
                            </div>
                            <div class="message-content">Agent已重置。请重新开始。</div>
                        </div>
                    `;
                } else {
                    log(`错误: ${data.error}`);
                }
            } catch (error) {
                log(`错误: ${error.message}`);
            }
        }

        async function getState() {
            try {
                log('获取状态...');
                
                const response = await fetch('/api/agent-test/state');
                const data = await response.json();
                updateStatus(data);
                
                if (data.success) {
                    log('状态已更新');
                    console.log('完整状态:', data.state);
                } else {
                    log(`错误: ${data.error}`);
                }
            } catch (error) {
                log(`错误: ${error.message}`);
            }
        }

        async function optimizeOutline() {
            if (isLoading) {
                log('正在处理中，请稍候...');
                return;
            }
            
            try {
                const background = document.getElementById('backgroundInput').value;
                const outline = document.getElementById('outlineInput').value;
                const requirements = document.getElementById('requirementsInput').value;
                
                if (!outline.trim()) {
                    log('请输入大纲内容');
                    return;
                }
                
                setLoading(true);
                log('开始优化大纲...');
                
                // 显示用户消息
                addMessage('user', `请优化以下大纲：\n\n${outline}\n\n背景：${background || '无'}\n要求：${requirements || '无'}`);
                
                const response = await fetch('/api/agent-test/optimize-outline', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        background: background || undefined,
                        outline: outline,
                        requirements: requirements || undefined
                    })
                });
                
                const data = await response.json();
                updateStatus(data);
                
                if (data.success) {
                    log('大纲优化成功！');
                    // 保存优化后的大纲
                    optimizedOutline = data.outline;
                    // 显示智能体回复
                    addMessage('agent', data.outline);
                } else {
                    log(`错误: ${data.error}`);
                    addMessage('agent', `错误：${data.error}`);
                }
            } catch (error) {
                log(`错误: ${error.message}`);
                addMessage('agent', `错误：${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        async function sendMessage() {
            if (isLoading) {
                log('正在处理中，请稍候...');
                return;
            }
            
            try {
                const message = document.getElementById('chatInput').value;
                
                if (!message.trim()) {
                    log('请输入消息内容');
                    return;
                }
                
                setLoading(true);
                log('发送消息给智能体...');
                
                // 显示用户消息
                addMessage('user', message);
                
                // 自动读取所有输入框内容，包括优化后的大纲
                const context = {
                    background: document.getElementById('backgroundInput').value,
                    outline: document.getElementById('outlineInput').value,
                    requirements: document.getElementById('requirementsInput').value,
                    optimizedOutline: optimizedOutline // 传递优化后的大纲
                };
                
                const response = await fetch('/api/agent-test/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        context: context
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // 显示智能体回复
                    addMessage('agent', data.response);
                    
                    // 检测返回内容是否包含大纲格式（以#标题开头）
                    const responseText = data.response;
                    if (responseText.includes('# ') && responseText.includes('## ')) {
                        // 提取markdown大纲部分（从第一个#开始到最后）
                        const outlineMatch = responseText.match(/#\s+.+[\s\S]*/);
                        if (outlineMatch) {
                            optimizedOutline = outlineMatch[0].trim();
                            log('已更新优化后的大纲');
                        }
                    }
                    
                    // 清空输入框
                    document.getElementById('chatInput').value = '';
                    
                    log('智能体已回复');
                } else {
                    addMessage('agent', `错误：${data.error}`);
                    log(`错误: ${data.error}`);
                }
            } catch (error) {
                log(`错误: ${error.message}`);
                addMessage('agent', `错误：${error.message}`);
            } finally {
                setLoading(false);
            }
        }

        // 导航功能
        function goToPrevious() {
            alert('文案列表功能即将推出，敬请期待！');
        }

        function goToNext() {
            if (!optimizedOutline) {
                alert('请先优化大纲！');
                return;
            }
            
            if (currentStep === 1) {
                // 进入第二步：生成文案
                currentStep = 2;
                showContentGenerationUI();
            }
        }

        function showContentGenerationUI() {
            // 更新导航按钮
            const navButtons = document.querySelector('.nav-buttons');
            navButtons.innerHTML = `
                <button class="nav-btn prev" onclick="goBackToStep1()">
                    ← 返回优化大纲
                </button>
                <span class="nav-step">
                    第二步 - 形成文案
                </span>
                <button class="nav-btn next" onclick="generateContent()">
                    生成文案 →
                </button>
            `;
            
            // 显示文案生成界面
            const statusBox = document.querySelector('.status-box:last-of-type');
            statusBox.innerHTML = `
                <h3>文案生成配置</h3>
                <div style="margin: 15px 0;">
                    <label style="font-weight: bold; display: block; margin-bottom: 5px;">主题：</label>
                    <input type="text" id="contentTheme" style="width: 100%; padding: 10px; border: 1px solid #ddd; font-family: monospace;" 
                           placeholder="根据大纲自动生成，可修改">
                </div>
                <div style="margin: 15px 0;">
                    <label style="font-weight: bold; display: block; margin-bottom: 5px;">类型：</label>
                    <select id="contentType" style="width: 100%; padding: 10px; border: 1px solid #ddd; font-family: monospace;">
                        <option value="article">公众号文章</option>
                        <option value="video">视频号图文</option>
                        <option value="both" selected>BOTH</option>
                    </select>
                </div>
                <div style="margin: 15px 0;">
                    <label style="font-weight: bold; display: block; margin-bottom: 5px;">篇数：</label>
                    <input type="text" id="contentCount" style="width: 100%; padding: 10px; border: 1px solid #ddd; font-family: monospace; background: #f5f5f5;" 
                           readonly placeholder="根据大纲自动生成">
                </div>
                <div style="margin: 15px 0;">
                    <label style="font-weight: bold; display: block; margin-bottom: 5px;">优化后的大纲：</label>
                    <textarea id="finalOutline" rows="10" style="width: 100%; padding: 10px; border: 1px solid #ddd; font-family: monospace;" 
                              placeholder="优化后的大纲将显示在这里..."></textarea>
                </div>
            `;
            
            // 填充优化后的大纲
            document.getElementById('finalOutline').value = optimizedOutline;
            
            // 自动提取主题和篇数
            autoExtractThemeAndCount();
        }

        function autoExtractThemeAndCount() {
            const outline = document.getElementById('finalOutline').value;
            
            // 从大纲中提取主题（第一个#标题）
            const themeMatch = outline.match(/^#\s+(.+)$/m);
            if (themeMatch) {
                document.getElementById('contentTheme').value = themeMatch[1].trim();
            }
            
            // 计算篇数（## 标题的数量）
            const countMatch = outline.match(/^##\s+/gm);
            const count = countMatch ? countMatch.length : 1;
            document.getElementById('contentCount').value = count;
        }

        function goBackToStep1() {
            currentStep = 1;
            location.reload(); // 简单重置回第一步
        }

        function generateContent() {
            const theme = document.getElementById('contentTheme').value;
            const type = document.getElementById('contentType').value;
            const count = document.getElementById('contentCount').value;
            const outline = document.getElementById('finalOutline').value;
            
            if (!outline.trim()) {
                alert('大纲不能为空！');
                return;
            }
            
            alert(`生成文案功能即将推出！\n\n主题：${theme}\n类型：${type}\n篇数：${count}`);
        }

        log('页面加载完成，点击"启动 Agent"开始测试');
    </script>
</body>
</html>
